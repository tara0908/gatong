<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가정통신문 생성기</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #eef2ff;
      --danger: #dc2626;
      --success: #047857;
      --shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans KR", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0, var(--bg) 260px);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(940px, calc(100% - 32px));
      margin: 0 auto;
      padding: 54px 0 70px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 44px);
      letter-spacing: -0.04em;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: 22px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 750;
      margin-bottom: 8px;
    }

    .required {
      color: var(--danger);
      margin-left: 3px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.10);
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.6;
    }

    .hint {
      margin-top: 7px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .length-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .length-option {
      position: relative;
    }

    .length-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .length-option label {
      margin: 0;
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 13px 10px;
      text-align: center;
      font-weight: 700;
      transition: 0.2s;
      background: #fff;
    }

    .length-option input:checked + label {
      border-color: var(--primary);
      background: var(--secondary);
      color: var(--primary);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    .primary {
      flex: 1;
      background: var(--primary);
      color: white;
    }

    .primary:hover { background: var(--primary-hover); }
    .primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .secondary:hover { background: #e5e7eb; }

    .status {
      display: none;
      padding: 12px 14px;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.show { display: block; }
    .status.error { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; }
    .status.loading { color: #3730a3; background: #eef2ff; border: 1px solid #c7d2fe; }

    .result-card {
      display: none;
    }

    .result-card.show {
      display: block;
      animation: fadeIn .25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .result-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .result {
      white-space: pre-wrap;
      line-height: 1.85;
      background: #fafafa;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      min-height: 150px;
      font-size: 15px;
    }

    .result-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .small-btn {
      padding: 10px 14px;
      font-size: 13px;
      background: #f3f4f6;
      color: #374151;
    }

    .copy-ok {
      color: var(--success);
      font-size: 13px;
      min-height: 20px;
      text-align: right;
      margin-top: 7px;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 10px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; gap: 0; }
      .card { padding: 20px; border-radius: 18px; }
      .length-options { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .secondary { order: 2; }
      .wrap { padding-top: 32px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>가정통신문 생성기</h1>
      <p>필요한 내용을 입력하면 AI 에이전트가 가정통신문 초안을 생성합니다.</p>
    </header>

    <section class="card">
      <h2 class="section-title">에이전트 설정</h2>

      <div class="grid">
        <div class="field">
          <label for="agentId">에이전트 ID <span class="required">*</span></label>
          <input
            id="agentId"
            type="password"
            autocomplete="off"
            placeholder="에이전트 ID를 입력하세요"
            required
          />
          <div class="hint">입력한 ID는 화면에서 ●●● 형태로 가려집니다.</div>
        </div>

        <div class="field">
          <label for="baseUrl">LangBridge URL</label>
          <input
            id="baseUrl"
            type="url"
            value="https://langbridge.kosac.laivdata.com"
            placeholder="https://langbridge.kosac.laivdata.com"
          />
          <div class="hint">기본값을 그대로 사용해도 됩니다.</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">가정통신문 내용</h2>

      <div class="field">
        <label for="topic">1. 가정통신문 주제 <span class="required">*</span></label>
        <input
          id="topic"
          type="text"
          placeholder="예: 교내 슬리퍼 착용 금지 안내"
          required
        />
      </div>

      <div class="field">
        <label for="request">2. 학교의 요청 사항</label>
        <textarea
          id="request"
          placeholder="예: 학생이 등교 시 반드시 실내화를 준비하고 착용하도록 가정에서 지도해 주세요."
        ></textarea>
      </div>

      <div class="field">
        <label for="reference">3. 기타 참고 사항</label>
        <textarea
          id="reference"
          placeholder="예: 미끄러짐 사고 예방, 발 건강 보호, 교내 위생 관리 목적"
        ></textarea>
      </div>

      <div class="field">
        <label>글 분량</label>
        <div class="length-options">
          <div class="length-option">
            <input type="radio" id="short" name="length" value="짧게(100자 내외)" />
            <label for="short">짧게<br><small>100자 내외</small></label>
          </div>
          <div class="length-option">
            <input type="radio" id="medium" name="length" value="중간(300자 내외)" />
            <label for="medium">중간<br><small>300자 내외</small></label>
          </div>
          <div class="length-option">
            <input type="radio" id="standard" name="length" value="표준(500자 내외)" checked />
            <label for="standard">표준<br><small>500자 내외</small></label>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="secondary" id="resetBtn" type="button">입력 초기화</button>
        <button class="primary" id="generateBtn" type="button">가정통신문 생성하기</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section class="card result-card" id="resultCard">
      <div class="result-head">
        <h2>생성된 가정통신문</h2>
      </div>
      <div id="result" class="result"></div>

      <div class="result-actions">
        <button class="small-btn" id="copyBtn" type="button">내용 복사</button>
        <button class="primary" id="regenerateBtn" type="button" style="flex:0 0 auto;">
          다시 생성하기
        </button>
      </div>
      <div id="copyMessage" class="copy-ok"></div>
    </section>

    <p class="footer-note">
      ※ 에이전트 ID를 비밀번호 형식으로 가리는 것은 화면 표시만 숨기는 기능입니다.
      브라우저에서 API를 직접 호출하므로 개발자 도구의 네트워크 요청에서는 값이 확인될 수 있습니다.
    </p>
  </main>

  <script>
    const $ = (selector) => document.querySelector(selector);

    const agentIdInput = $("#agentId");
    const baseUrlInput = $("#baseUrl");
    const topicInput = $("#topic");
    const requestInput = $("#request");
    const referenceInput = $("#reference");
    const generateBtn = $("#generateBtn");
    const regenerateBtn = $("#regenerateBtn");
    const resetBtn = $("#resetBtn");
    const resultCard = $("#resultCard");
    const resultBox = $("#result");
    const statusBox = $("#status");
    const copyBtn = $("#copyBtn");
    const copyMessage = $("#copyMessage");

    function normalizeBaseUrl(url) {
      return url.trim().replace(/\/+$/, "");
    }

    function getSelectedLength() {
      return document.querySelector('input[name="length"]:checked')?.value || "표준(500자 내외)";
    }

    function setStatus(message = "", type = "") {
      statusBox.textContent = message;
      statusBox.className = "status";
      if (message) {
        statusBox.classList.add("show");
        if (type) statusBox.classList.add(type);
      }
    }

    function buildUserInput() {
      const topic = topicInput.value.trim();
      const request = requestInput.value.trim();
      const reference = referenceInput.value.trim();
      const length = getSelectedLength();

      return [
        "다음 정보를 바탕으로 학부모에게 보내는 자연스럽고 정중한 가정통신문을 작성해 주세요.",
        "별도의 설명 없이 가정통신문 본문만 작성하세요.",
        `글 분량: ${length}`,
        "",
        `[가정통신문 주제]`,
        topic,
        "",
        `[학교의 요청 사항]`,
        request || "별도 요청 사항 없음",
        "",
        `[기타 참고 사항]`,
        reference || "별도 참고 사항 없음"
      ].join("\n");
    }

    async function runAgent() {
      const agentId = agentIdInput.value.trim();
      const baseUrl = normalizeBaseUrl(baseUrlInput.value);
      const topic = topicInput.value.trim();

      if (!agentId) {
        setStatus("에이전트 ID를 입력해 주세요.", "error");
        agentIdInput.focus();
        return;
      }

      if (!baseUrl) {
        setStatus("LangBridge URL을 입력해 주세요.", "error");
        baseUrlInput.focus();
        return;
      }

      if (!topic) {
        setStatus("가정통신문 주제를 입력해 주세요.", "error");
        topicInput.focus();
        return;
      }

      generateBtn.disabled = true;
      regenerateBtn.disabled = true;
      copyMessage.textContent = "";
      setStatus("가정통신문을 생성하고 있습니다…", "loading");

      try {
        // 1. 세션 생성
        const sessionResponse = await fetch(`${baseUrl}/sessions`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            agentId: agentId
          })
        });

        if (!sessionResponse.ok) {
          const errorText = await sessionResponse.text();
          throw new Error(`세션 생성 실패 (${sessionResponse.status})${errorText ? ": " + errorText : ""}`);
        }

        const sessionData = await sessionResponse.json();
        const sessionId = sessionData.sessionId;

        if (!sessionId) {
          throw new Error("응답에서 sessionId를 찾을 수 없습니다.");
        }

        // 2. Agent 실행
        const runResponse = await fetch(`${baseUrl}/agents/run`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            sessionId: sessionId,
            query: {
              userInput: buildUserInput()
            }
          })
        });

        if (!runResponse.ok) {
          const errorText = await runResponse.text();
          throw new Error(`에이전트 실행 실패 (${runResponse.status})${errorText ? ": " + errorText : ""}`);
        }

        const data = await runResponse.json();

        // 대표 응답 형식: { "answer": "..." }
        const answer =
          data?.answer ??
          data?.data?.answer ??
          data?.result?.answer ??
          (typeof data === "string" ? data : JSON.stringify(data, null, 2));

        resultBox.textContent = answer || "생성 결과가 비어 있습니다.";
        resultCard.classList.add("show");
        setStatus("");

        resultCard.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      } catch (error) {
        console.error(error);
        let message = error?.message || "알 수 없는 오류가 발생했습니다.";

        if (message.toLowerCase().includes("failed to fetch")) {
          message +=
            "\n\n브라우저의 CORS 정책 때문에 요청이 차단되었을 수 있습니다. " +
            "이 경우 LangBridge 서버에서 해당 웹페이지 출처를 허용하거나, 별도의 백엔드 프록시를 통해 호출해야 합니다.";
        }

        setStatus(message, "error");
      } finally {
        generateBtn.disabled = false;
        regenerateBtn.disabled = false;
      }
    }

    generateBtn.addEventListener("click", runAgent);
    regenerateBtn.addEventListener("click", runAgent);

    resetBtn.addEventListener("click", () => {
      topicInput.value = "";
      requestInput.value = "";
      referenceInput.value = "";
      $("#standard").checked = true;
      setStatus("");
      resultBox.textContent = "";
      resultCard.classList.remove("show");
      copyMessage.textContent = "";
      topicInput.focus();
    });

    copyBtn.addEventListener("click", async () => {
      const text = resultBox.textContent.trim();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        copyMessage.textContent = "복사되었습니다.";
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        copyMessage.textContent = "복사되었습니다.";
      }

      setTimeout(() => {
        copyMessage.textContent = "";
      }, 1800);
    });
  </script>
</body>
</html>
